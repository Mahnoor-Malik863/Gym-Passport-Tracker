<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Passport — Benefit Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0eff9;
  --surface:#ffffff;
  --surface-2:#f7f7fc;
  --sidebar:#1a1a2e;
  --sidebar-text:#a8a8c8;
  --sidebar-active:#ffffff;
  --sidebar-accent:#6c63ff;
  --accent:#6c63ff;
  --accent-light:#ede9ff;
  --green:#16a34a;--green-light:#dcfce7;
  --red:#dc2626;--red-light:#fee2e2;
  --amber:#d97706;--amber-light:#fef3c7;
  --blue:#2563eb;--blue-light:#dbeafe;
  --text:#111118;--text-2:#52525e;--text-3:#a0a0b0;
  --border:#e4e4f0;
  --radius:10px;
  --shadow:0 1px 4px rgba(0,0,0,.07);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:13px;line-height:1.5}

/* ─── LOGIN ─── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--sidebar)}
.login-box{background:#fff;border-radius:16px;padding:40px 36px;width:340px;max-width:92vw;text-align:center}
.login-logo{width:52px;height:52px;border-radius:14px;background:var(--accent-light);margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--accent)}
.login-box h2{font-size:18px;font-weight:600;margin-bottom:4px}
.login-box p{font-size:12px;color:var(--text-3);margin-bottom:24px}
.login-box input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;margin-bottom:10px;background:var(--surface-2);font-family:inherit;color:var(--text)}
.login-box input:focus{outline:none;border-color:var(--accent)}
.login-box button{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.login-box button:hover{background:#5b52e0}
.login-err{font-size:11px;color:var(--red);margin-top:8px;display:none}

/* ─── SHELL ─── */
#app{display:none;height:100vh;grid-template-columns:220px 1fr;grid-template-rows:1fr}

/* ─── SIDEBAR ─── */
.sidebar{background:var(--sidebar);display:flex;flex-direction:column;height:100vh;overflow-y:auto}
.sb-logo{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo-name{font-size:14px;font-weight:600;color:#fff;letter-spacing:-.01em}
.sb-logo-sub{font-size:10px;color:var(--sidebar-text);margin-top:2px;letter-spacing:.04em;text-transform:uppercase}
.sb-section{padding:18px 20px 6px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.25)}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 20px;font-size:12px;cursor:pointer;color:var(--sidebar-text);border-left:2px solid transparent;transition:all .15s;background:none;border-top:none;border-right:none;border-bottom:none;width:100%;text-align:left;font-family:inherit}
.sb-item:hover{background:rgba(255,255,255,.05);color:#fff}
.sb-item.active{background:rgba(108,99,255,.18);color:#fff;border-left-color:var(--accent)}
.sb-item i{font-size:16px;width:18px;opacity:.7}
.sb-item.active i{opacity:1}
.sb-months{display:flex;flex-direction:column;gap:2px;padding:6px 12px}
.sb-month{padding:7px 12px;border-radius:7px;font-size:12px;cursor:pointer;color:var(--sidebar-text);background:none;border:none;display:flex;align-items:center;justify-content:space-between;width:100%;font-family:inherit;transition:all .15s}
.sb-month:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-month.active{background:rgba(108,99,255,.22);color:#fff;font-weight:500}
.sb-badge{font-size:10px;background:rgba(255,255,255,.1);border-radius:20px;padding:1px 7px;color:rgba(255,255,255,.5)}
.sb-month.active .sb-badge{background:var(--accent);color:#fff;opacity:1}
.sb-bottom{margin-top:auto;padding:14px 12px;border-top:1px solid rgba(255,255,255,.06)}

/* ─── MAIN ─── */
.main{display:flex;flex-direction:column;height:100vh;overflow:hidden;background:var(--bg)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar-title{font-size:16px;font-weight:600;letter-spacing:-.01em}
.topbar-sub{font-size:11px;color:var(--text-3);margin-top:2px}
.topbar-actions{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;color:var(--text-2);transition:all .12s;font-family:inherit;font-weight:500}
.btn:hover{background:var(--surface-2);border-color:#c8c8e0}
.btn.accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.accent:hover{background:#5b52e0}
.btn i{font-size:14px}
.vtabs{display:flex;gap:0;padding:0 28px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.vtab{padding:10px 16px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text-3);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;transition:all .12s}
.vtab:hover{color:var(--text-2)}
.vtab.active{color:var(--accent);border-bottom-color:var(--accent)}
.content{padding:24px 28px;overflow-y:auto;flex:1}

/* ─── KPI STRIP ─── */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--surface);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);border:1px solid var(--border)}
.kpi-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.kpi-value{font-size:26px;font-weight:700;letter-spacing:-.02em;line-height:1}
.kpi-delta{font-size:11px;margin-top:6px}
.up{color:var(--green)}.down{color:var(--red)}.neutral{color:var(--text-3)}

/* ─── GRID ─── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:var(--surface);border-radius:12px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.card-title{font-size:13px;font-weight:600}
.card-sub{font-size:11px;color:var(--text-3)}
.card-link{font-size:11px;color:var(--accent);cursor:pointer;background:none;border:none;font-family:inherit;padding:3px 8px;border-radius:6px}
.card-link:hover{background:var(--accent-light)}

/* ─── TABLE ─── */
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 14px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);border-bottom:1px solid var(--border);background:var(--surface-2)}
td{padding:9px 14px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface-2)}
.t-name{font-weight:500;color:var(--text)}
.t-dim{color:var(--text-3)}
.t-sec{color:var(--text-2)}

/* ─── BADGES ─── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600}
.badge-green{background:var(--green-light);color:var(--green)}
.badge-red{background:var(--red-light);color:var(--red)}
.badge-amber{background:var(--amber-light);color:var(--amber)}
.badge-blue{background:var(--blue-light);color:var(--blue)}
.badge-purple{background:var(--accent-light);color:var(--accent)}

/* ─── POLICY FLAG ─── */
.flag-row{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:10px;background:#fff9f9;border:1px solid #fecaca;margin-bottom:8px}
.flag-icon{font-size:16px;color:var(--red);margin-top:1px;flex-shrink:0}
.flag-name{font-weight:600;font-size:12px}
.flag-detail{font-size:11px;color:var(--text-2);margin-top:2px}

/* ─── SESSIONS ─── */
.sess-input{width:56px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;text-align:center;background:var(--surface-2);color:var(--text);font-family:inherit}
.sess-input:focus{outline:none;border-color:var(--accent)}
.usage-bar{display:flex;align-items:center;gap:8px}
.bar-track{flex:1;height:5px;background:var(--surface-2);border-radius:3px;overflow:hidden;min-width:60px}
.bar-fill{height:100%;border-radius:3px}

/* ─── SEARCH ─── */
.search-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.search-wrap{position:relative;flex:1}
.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:14px;pointer-events:none}
.search-input{width:100%;padding:8px 12px 8px 32px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;background:var(--surface);color:var(--text);font-family:inherit}
.search-input:focus{outline:none;border-color:var(--accent)}
.count-label{font-size:11px;color:var(--text-3);white-space:nowrap}

/* ─── PAGER ─── */
.pager{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--text-3)}
.pager-btn{padding:4px 11px;border:1px solid var(--border);border-radius:6px;background:none;cursor:pointer;font-size:11px;color:var(--text-2);font-family:inherit}
.pager-btn:hover{background:var(--surface-2)}
.pager-btn:disabled{opacity:.35;cursor:default}

/* ─── DEL BTN ─── */
.del-btn{background:none;border:none;cursor:pointer;color:var(--text-3);padding:3px 6px;border-radius:5px;font-size:13px;opacity:0;transition:opacity .1s}
tr:hover .del-btn{opacity:1}
.del-btn:hover{color:var(--red)}

/* ─── MODAL ─── */
.modal-bg{position:fixed;inset:0;background:rgba(10,10,20,.5);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:26px;width:420px;max-width:96vw;box-shadow:0 8px 32px rgba(0,0,0,.14)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:3px}
.modal-sub{font-size:12px;color:var(--text-3);margin-bottom:20px}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-2);margin-bottom:5px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--surface-2);color:var(--text);font-family:inherit}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:var(--accent)}
.form-row textarea{resize:vertical;min-height:110px;font-size:12px}
.modal-footer{display:flex;justify-content:flex-end;gap:9px;margin-top:20px}
.modal-footer button{padding:9px 20px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;cursor:pointer;font-size:13px;font-family:inherit;color:var(--text-2);font-weight:500}
.modal-footer .btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.modal-footer .btn-accent:hover{background:#5b52e0}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:22px;right:22px;background:var(--sidebar);color:#fff;padding:11px 18px;border-radius:10px;font-size:12px;z-index:300;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;font-weight:500}
.toast.show{opacity:1;transform:translateY(0)}

/* ─── EMPTY ─── */
.empty{padding:36px;text-align:center;color:var(--text-3)}
.empty i{font-size:30px;display:block;margin-bottom:10px;opacity:.3}

/* ─── TIMELINE ─── */
.timeline{padding:0 2px}
.tl-month{margin-bottom:24px}
.tl-month-label{font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.tl-month-label::after{content:'';flex:1;height:1px;background:var(--border)}
.tl-event{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
.tl-dot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0}
.tl-text{font-size:12px}
.tl-name{font-weight:500}
.tl-meta{font-size:11px;color:var(--text-3)}

/* ─── CHART WRAP ─── */
.chart-wrap{position:relative;width:100%}

/* ─── MINI BAR ─── */
.mini-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.mini-bar-label{font-size:11px;color:var(--text-2);width:58px;text-align:right;flex-shrink:0}
.mini-bar-track{flex:1;height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden}
.mini-bar-fill{height:100%;border-radius:3px}
.mini-bar-val{font-size:11px;color:var(--text-3);width:26px;text-align:right}

/* ─── EMPLOYEE PROFILE ─── */
.emp-timeline-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo"><i class="ti ti-barbell"></i></div>
    <h2>Gym Passport</h2>
    <p>HR benefit tracker — CodeNinja</p>
    <input type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')tryLogin()">
    <button onclick="tryLogin()">Sign in</button>
    <div class="login-err" id="pw-err">Incorrect password. Try again.</div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-name">Gym Passport</div>
      <div class="sb-logo-sub">Benefit tracker</div>
    </div>
    <div class="sb-section">Views</div>
    <button class="sb-item active" onclick="nav('overview')" id="nav-overview"><i class="ti ti-layout-dashboard"></i>Overview</button>
    <button class="sb-item" onclick="nav('members')" id="nav-members"><i class="ti ti-users"></i>Members</button>
    <button class="sb-item" onclick="nav('employee')" id="nav-employee"><i class="ti ti-user-search"></i>Employee lookup</button>
    <button class="sb-item" onclick="nav('sessions')" id="nav-sessions"><i class="ti ti-activity"></i>Sessions</button>
    <button class="sb-item" onclick="nav('policy')" id="nav-policy"><i class="ti ti-shield-check"></i>Policy compliance</button>
    <button class="sb-item" onclick="nav('budget')" id="nav-budget"><i class="ti ti-receipt"></i>Budget & invoices</button>
    <button class="sb-item" onclick="nav('audit')" id="nav-audit"><i class="ti ti-clipboard-list"></i>Audit log</button>
    <div class="sb-section">Month</div>
    <div class="sb-months" id="sb-months"></div>
    <div style="padding:6px 12px 4px">
      <button class="btn" style="width:100%;justify-content:center;font-size:11px" onclick="addNextMonth()"><i class="ti ti-plus"></i>Add next month</button>
    </div>
    <div class="sb-bottom">
      <button class="sb-item" onclick="logout()" style="border-radius:8px"><i class="ti ti-logout"></i>Sign out</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="topbar-title">Overview</div>
        <div class="topbar-sub" id="topbar-sub"></div>
      </div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="vtabs" id="vtabs" style="display:none">
      <button class="vtab active" onclick="setVtab('activations')" id="vtab-activations">Activations</button>
      <button class="vtab" onclick="setVtab('deactivations')" id="vtab-deactivations">Deactivations</button>
    </div>
    <div class="content" id="main-content"></div>
  </div>
</div>

<div id="modal-root"></div>
<div class="toast" id="toast-el"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════
const PW = 'gympassport';
const SK = 'gp_auth';
const DK = 'gp_data_v3';
const MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const PAGE = 15;
const MIN_SESSIONS = 6; // minimum monthly sessions to meet policy requirement

// builds a contiguous month list from 2026-03 up to (and including) the real current month
function buildDefaultMonths() {
  const months = [];
  let y = 2026, mo = 3; // start March 2026
  const now = new Date();
  const endY = now.getFullYear(), endMo = now.getMonth()+1;
  while (y < endY || (y === endY && mo <= endMo)) {
    months.push(`${y}-${String(mo).padStart(2,'0')}`);
    mo++; if (mo>12){mo=1;y++;}
  }
  if (months.length === 0) months.push(`${y}-${String(mo).padStart(2,'0')}`); // safety: always at least one month
  return months;
}

// Shifts a YYYY-MM string forward by N years
function shiftYear(monthKey, years) {
  const [y,mo] = monthKey.split('-').map(Number);
  return `${y+years}-${String(mo).padStart(2,'0')}`;
}

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let S = {
  months: buildDefaultMonths(),
  activeMonth: '',
  // data[month] = { activations:[{name,date,notes}], deactivations:[{name,date,reason}], sessions:{name:n}, invoice:{filename,dataUrl,amount} }
  data: {},
  view: 'overview',
  vtab: 'activations',
  q: '',
  page: 0,
  empSearch: ''
};
S.activeMonth = S.months[S.months.length-1];

// ═══════════════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════════════
function tryLogin() {
  if (document.getElementById('pw-input').value === PW) {
    sessionStorage.setItem(SK,'1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'grid';
    init();
  } else {
    document.getElementById('pw-err').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
function logout() { sessionStorage.removeItem(SK); location.reload(); }

// ═══════════════════════════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════════════════════════
function loadData() {
  try {
    const r = localStorage.getItem(DK);
    if (r) {
      const p = JSON.parse(r);
      S.months = p.months || S.months;
      S.data = p.data || {};
    }
  } catch(e){}

  // One-time migration: earlier versions of this tracker mistakenly started in March 2025.
  // Tracking actually began March 2026 — shift any 2025-labeled months forward one year,
  // keeping all activation/deactivation/session/invoice data intact under the corrected month key.
  const hasOldYear = S.months.some(m => m.startsWith('2025-'));
  if (hasOldYear) {
    const newMonths = S.months.map(m => m.startsWith('2025-') ? shiftYear(m,1) : m);
    const newData = {};
    for (const m of S.months) {
      const newKey = m.startsWith('2025-') ? shiftYear(m,1) : m;
      newData[newKey] = S.data[m];
    }
    S.months = [...new Set(newMonths)].sort();
    S.data = newData;
    saveData();
  }

  // extend months list if there's a gap to the real current month (handles old saves stuck in the past)
  const realCurrent = buildDefaultMonths();
  const last = S.months[S.months.length-1];
  const lastRealIdx = realCurrent.indexOf(last);
  if (lastRealIdx >= 0 && lastRealIdx < realCurrent.length-1) {
    for (let i=lastRealIdx+1; i<realCurrent.length; i++) {
      if (!S.months.includes(realCurrent[i])) S.months.push(realCurrent[i]);
    }
  }

  // Always enforce floor — remove any month before March 2026 from both the list and data
  const FLOOR = '2026-03';
  S.months = S.months.filter(m => m >= FLOOR);
  for (const m of Object.keys(S.data)) {
    if (m < FLOOR) delete S.data[m];
  }

  S.activeMonth = S.months[S.months.length-1];
  saveData();
}
function saveData() {
  try {
    localStorage.setItem(DK, JSON.stringify({months:S.months, data:S.data}));
  } catch(e) {
    toast('Storage limit reached — try a smaller invoice PDF, or delete an old one first');
  }
}

// ═══════════════════════════════════════════════════════════
//  DATA HELPERS
// ═══════════════════════════════════════════════════════════
function md(m) {
  if (!S.data[m]) S.data[m]={activations:[],deactivations:[],sessions:{},invoice:null};
  if (!S.data[m].invoice) S.data[m].invoice = null;
  return S.data[m];
}

function ml(m) {
  const [y,mo]=m.split('-');
  return MO[parseInt(mo)-1]+' '+y;
}

// Normalize a name for matching purposes — collapses case/spacing differences
// so "John Smith", " john  smith", "JOHN SMITH" are all treated as the same person
function nkey(name) {
  return (name||'').trim().toLowerCase().replace(/\s+/g,' ');
}

// Returns Set of active employee names as of end of given month
// Uses cumulative model: carries forward unless deactivated
// Tracks by normalized key internally, but stores the display name (first-seen spelling)
function activeSet(upToMonth) {
  const members = new Map(); // nkey -> display name
  for (const m of S.months) {
    const d = md(m);
    for (const a of d.activations) members.set(nkey(a.name), a.name);
    for (const a of d.deactivations) members.delete(nkey(a.name));
    if (m === upToMonth) break;
  }
  return new Set(members.values());
}

function activeArr(m) {
  return [...activeSet(m)].sort((a,b)=>a.localeCompare(b));
}

// Finds inconsistent spellings/casing of the same person across entries —
// surfaces these so they can be cleaned up (they break activation/deactivation matching)
function findNameVariants() {
  const groups = {};
  for (const m of S.months) {
    const d = md(m);
    for (const a of [...d.activations, ...d.deactivations]) {
      const k = nkey(a.name);
      if (!groups[k]) groups[k] = new Set();
      groups[k].add(a.name);
    }
  }
  return Object.values(groups).filter(s => s.size > 1).map(s => [...s]);
}

function prevMonth(m) {
  const i = S.months.indexOf(m);
  return i > 0 ? S.months[i-1] : null;
}

// Full history of an employee across all months
function empHistory(name) {
  const key = nkey(name);
  const events = [];
  let isActive = false;
  for (const m of S.months) {
    const d = md(m);
    const act = d.activations.find(a=>nkey(a.name)===key);
    const deact = d.deactivations.find(a=>nkey(a.name)===key);
    if (act) { events.push({month:m,type:'activated',date:act.date,note:act.notes||''}); isActive=true; }
    if (deact) { events.push({month:m,type:'deactivated',date:deact.date,note:deact.reason||deact.notes||''}); isActive=false; }
    if (!act && !deact && isActive) {
      // find sessions under any matching spelling for this month
      const d2 = md(m);
      let sess = 0;
      for (const k in d2.sessions) { if (nkey(k)===key) sess = parseInt(d2.sessions[k])||0; }
      events.push({month:m,type:'active',sessions:sess});
    }
  }
  return events;
}

// All unique employee names ever seen (normalized, displaying first-seen spelling)
function allEmployees() {
  const seen = new Map(); // nkey -> display name
  for (const m of S.months) {
    const d = md(m);
    [...d.activations, ...d.deactivations].forEach(a => {
      const k = nkey(a.name);
      if (!seen.has(k)) seen.set(k, a.name);
    });
  }
  return [...seen.values()].sort((a,b)=>a.localeCompare(b));
}

// Policy: employees deactivated 2+ times across any months
function policyFlags() {
  const flags = [];
  const employees = allEmployees();
  for (const name of employees) {
    const key = nkey(name);
    const hist = empHistory(name);
    const deactMonths = S.months.filter(m => md(m).deactivations.some(a=>nkey(a.name)===key));
    const actCount = S.months.filter(m => md(m).activations.some(a=>nkey(a.name)===key)).length;
    if (deactMonths.length >= 2) {
      flags.push({name, deactMonths, actCount, hist});
    }
  }
  return flags;
}

function todayStr() { return new Date().toISOString().slice(0,10); }
function esc(s) { return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''; }

function nav(v) {
  S.view=v; S.page=0; S.q=''; S.empSearch='';
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('nav-'+v)?.classList.add('active');

  renderTopbar(); renderContent();
}

function setVtab(t) {
  S.vtab=t; S.page=0;
  document.querySelectorAll('.vtab').forEach(el=>el.classList.remove('active'));
  document.getElementById('vtab-'+t)?.classList.add('active');
  renderContent();
}

function switchMonth(m) {
  S.activeMonth=m; S.page=0; S.q='';
  renderSidebar(); renderTopbar(); renderContent();
}

function addNextMonth() {
  const last=S.months[S.months.length-1];
  const [y,mo]=last.split('-').map(Number);
  let ny=y,nmo=mo+1;
  if(nmo>12){nmo=1;ny++;}
  const next=`${ny}-${String(nmo).padStart(2,'0')}`;
  if(!S.months.includes(next)){S.months.push(next);S.activeMonth=next;saveData();render();}
}

function dEl(curr,prev,invert=false) {
  if(prev===null)return'<span class="neutral">Starting month</span>';
  const d=curr-prev;
  if(d===0)return'<span class="neutral">No change</span>';
  const isGood=invert?(d<0):(d>0);
  const cls=isGood?'up':'down';
  const arrow=d>0?'↑':'↓';
  return`<span class="${cls}">${arrow} ${Math.abs(d)} vs last month</span>`;
}

          return`<tr>

    </div>
  `;
}

function updateSess(name,val) {
  md(S.activeMonth).sessions[name]=Math.max(0,parseInt(val)||0);
  saveData();
}

// Moves all session data from one month to another (overwrites destination sessions)
function moveMonthSessions() {
  const from = document.getElementById('fix-from').value;
  const to = document.getElementById('fix-to').value;
  if (from === to) { toast('Choose two different months'); return; }
  const fromData = md(from);
  const toData = md(to);
  const count = Object.keys(fromData.sessions).length;
  if (count === 0) { toast(`No session data in ${ml(from)} to move`); return; }
  toData.sessions = {...fromData.sessions};
  fromData.sessions = {};
  saveData();
  toast(`Moved ${count} session records from ${ml(from)} to ${ml(to)}`);
  render();
}

function clearMonthSessions() {
  const from = document.getElementById('fix-from').value;
  const d = md(from);
  const count = Object.keys(d.sessions).length;
  if (count === 0) { toast(`No session data in ${ml(from)} to clear`); return; }
  d.sessions = {};
  saveData();
  toast(`Cleared ${count} session records from ${ml(from)}`);
  render();
}

function showCsvSessionModal() {
  document.getElementById('modal-root').innerHTML=`
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Upload Gym Passport CSV</h3>
        <div class="modal-sub">Export from portal.gympassport.pk with the date range set to the month you're importing. "Total Check-ins" in that export is read as that month's session count.</div>

          <select id="m-csv-month">
            ${S.months.map(m=>`<option value="${m}" ${m===S.activeMonth?'selected':''}>${ml(m)}</option>`).join('')}
          </select>
        </div>
        <div id="m-csv-preview" style="font-size:11px;color:var(--text-3);margin-top:4px"></div>
        <div class="modal-footer">
          <button onclick="closeModal()">Cancel</button>
          <button class="btn-accent" onclick="saveCsvSessions()">Import</button>
        </div>
      </div>
    </div>`;
  document.getElementById('m-csv-file').addEventListener('change', e=>{
    const f=e.target.files[0];
    if(!f)return;
    // try to auto-detect target month from filename, e.g. employees-2026-03-01.csv
    const fnMatch = f.name.match(/(\d{4})-(\d{2})-\d{2}/);
    let detectedMonth = null;
    if (fnMatch) {
      const candidate = `${fnMatch[1]}-${fnMatch[2]}`;
      if (S.months.includes(candidate)) detectedMonth = candidate;
    }
    const reader=new FileReader();
    reader.onload=ev=>{
      S._csvText=ev.target.result;
      const parsed=parseGymPassportCsv(S._csvText);
      const sel = document.getElementById('m-csv-month');
      let preview = `Found ${parsed.length} employee rows in this file.`;
      if (detectedMonth) {
        sel.value = detectedMonth;
        preview += ` Detected month from filename: ${ml(detectedMonth)} — double check before importing.`;
      } else {
        preview += ` Could not detect month from filename — confirm the target month above before importing.`;
      }
      document.getElementById('m-csv-preview').textContent = preview;
    };
    reader.readAsText(f);
  });
}

// Parses the Gym Passport employee CSV export. Tolerant of column order via header matching.
function parseGymPassportCsv(text) {
  const lines = text.split(/\r?\n/).filter(l=>l.trim().length>0);
  if (lines.length===0) return [];
  const headers = splitCsvLine(lines[0]).map(h=>h.trim().toLowerCase());
  const nameIdx = headers.findIndex(h=>h.includes('employee')&&!h.includes('id')&&!h.includes('email'));
  const chkIdx = headers.findIndex(h=>h.includes('check'));
  const statusIdx = headers.findIndex(h=>h.includes('status'));
  if (nameIdx===-1 || chkIdx===-1) return [];
  const rows=[];
  for (let i=1;i<lines.length;i++) {
    const cols=splitCsvLine(lines[i]);
    const name=(cols[nameIdx]||'').trim();
    if (!name) continue;
    const checkins=parseInt((cols[chkIdx]||'0').replace(/[^0-9-]/g,''))||0;
    const status=statusIdx>=0?(cols[statusIdx]||'').trim().toLowerCase():'';
    rows.push({name, checkins, status});
  }
  return rows;
}

function splitCsvLine(line) {
  const out=[]; let cur=''; let inQ=false;
  for (let i=0;i<line.length;i++) {
    const c=line[i];
    if (c==='"') { inQ=!inQ; continue; }
    if (c===',' && !inQ) { out.push(cur); cur=''; continue; }
    cur+=c;
  }
  out.push(cur);
  return out;
}

function saveCsvSessions() {
  if (!S._csvText) { toast('Choose a CSV file first'); return; }
  const targetMonth = document.getElementById('m-csv-month').value;
  const rows=parseGymPassportCsv(S._csvText);
  if (rows.length===0) { toast('Could not read employee/check-in columns from this file'); return; }
  const d=md(targetMonth);
  let count=0;
  for (const r of rows) {
    d.sessions[r.name]=r.checkins;
    count++;
  }
  saveData(); closeModal(); S._csvText=null;
  S.activeMonth = targetMonth;
  toast(`Imported sessions for ${count} employees into ${ml(targetMonth)}`);
  render();
}

// ── Invoice upload ──
function showInvoiceModal() {
  const existing = md(S.activeMonth).invoice;
  document.getElementById('modal-root').innerHTML=`
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Upload invoice</h3>
        <div class="modal-sub">${ml(S.activeMonth)}${existing?' — replaces existing invoice':''}</div>
        <div class="form-row">
          <label>Invoice PDF</label>
          <input id="m-inv-file" type="file" accept="application/pdf">
        </div>
        <div class="form-row">
          <label>Invoice amount (PKR)</label>
          <input id="m-inv-amount" type="number" min="0" step="1" placeholder="e.g. 185000" value="${existing&&existing.amount?existing.amount:''}">
        </div>
        <div class="modal-footer">
          <button onclick="closeModal()">Cancel</button>
          <button class="btn-accent" onclick="saveInvoice()">Save</button>
        </div>
      </div>
    </div>`;
}

function saveInvoice() {
  const amount = parseFloat(document.getElementById('m-inv-amount').value)||0;
  const fileInput = document.getElementById('m-inv-file');
  const d = md(S.activeMonth);
  if (fileInput.files[0] && fileInput.files[0].size > 3*1024*1024) {
    toast('PDF is over 3MB — try a smaller/compressed file to avoid storage limits');
    return;
  }
  const finish = (dataUrl, filename) => {
    d.invoice = { filename: filename||(d.invoice&&d.invoice.filename)||'invoice.pdf', dataUrl: dataUrl||(d.invoice&&d.invoice.dataUrl)||null, amount };
    saveData(); closeModal();
    toast(`Invoice saved for ${ml(S.activeMonth)}`);
    render();
  };
  if (fileInput.files[0]) {
    const reader = new FileReader();
    reader.onload = e => finish(e.target.result, fileInput.files[0].name);
    reader.readAsDataURL(fileInput.files[0]);
  } else {
    finish(null, null);
  }
}

function deleteInvoice(m) {
  md(m).invoice = null;
  saveData(); toast('Invoice removed'); render();
}

function closeModal() { document.getElementById('modal-root').innerHTML=''; }

function saveEntry(type) {
  const name=document.getElementById('m-name').value.trim();
  if(!name){document.getElementById('m-name').style.borderColor='var(--red)';return;}
  const date=document.getElementById('m-date').value;
  const notes=document.getElementById('m-notes').value.trim();
  const key=type==='activation'?'activations':'deactivations';
  md(S.activeMonth)[key].push({name,date,notes});
  saveData(); closeModal();
  toast(`${name} ${type==='activation'?'activated':'deactivated'} in ${ml(S.activeMonth)}`);
  render();
}

function saveBulk() {
  const raw=document.getElementById('m-bulk').value.trim();
  const type=document.getElementById('m-bulk-type').value;
  const defDate=document.getElementById('m-bulk-date').value;
  if(!raw)return;
  const key=type==='activation'?'activations':'deactivations';
  const d=md(S.activeMonth);
  let count=0;
  for(const line of raw.split('\n').map(l=>l.trim()).filter(Boolean)){
    const [name,date,...rest]=line.split(',').map(p=>p.trim());
    if(!name)continue;
    d[key].push({name,date:date||defDate,notes:rest.join(', ')});
    count++;
  }
  saveData(); closeModal();
  toast(`Imported ${count} ${type==='activation'?'activations':'deactivations'}`);
  render();
}

function saveBulkSessions() {
  const raw=document.getElementById('m-sess').value.trim();
  if(!raw)return;
  const d=md(S.activeMonth);
  let count=0;
  for(const line of raw.split('\n').map(l=>l.trim()).filter(Boolean)){
    const parts=line.split(',').map(p=>p.trim());
    const name=parts[0];const sess=parseInt(parts[1])||0;
    if(!name)continue;
    d.sessions[name]=sess;count++;
  }
  saveData(); closeModal();
  toast(`Updated ${count} session records`);
  render();
}

function deleteEntry(type,idx) {
  const key=type==='activation'?'activations':'deactivations';
  const d=md(S.activeMonth);
  const name=d[key][idx]?.name;
  d[key].splice(idx,1);
  saveData(); toast(`Removed ${name}`); render();
}

// ═══════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════
function toast(msg) {
  const el=document.getElementById('toast-el');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2400);
}

function init() { loadData(); render(); }

// Boot
if(sessionStorage.getItem(SK)==='1'){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='grid';
  init();
}
</script>
